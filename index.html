<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Azul — Royal Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ===== Background layers ===== -->
<div class="bg-base"></div>

<!-- Layer A: large-scale star-and-cross azulejo medallions -->
<svg class="bg-tilewall" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <!-- 8-pointed star (Khatim) -->
    <polygon id="kstar" points="50,10 56.5,34.3 78.3,21.7 65.7,43.5 90,50 65.7,56.5 78.3,78.3 56.5,65.7 50,90 43.5,65.7 21.7,78.3 34.3,56.5 10,50 34.3,43.5 21.7,21.7 43.5,34.3"/>
    <!-- small octagon cross -->
    <polygon id="kcross" points="0,-16 11.3,-11.3 16,0 11.3,11.3 0,16 -11.3,11.3 -16,0 -11.3,-11.3"/>
    <pattern id="wall" width="220" height="220" patternUnits="userSpaceOnUse">
      <!-- connecting lattice of interlaced lines -->
      <g fill="none" stroke="#e6c45e" stroke-width="1.1" opacity="0.5">
        <use href="#kstar" transform="translate(110,110) scale(1.05)"/>
        <use href="#kstar" transform="translate(0,0) scale(1.05)"/>
        <use href="#kstar" transform="translate(220,0) scale(1.05)"/>
        <use href="#kstar" transform="translate(0,220) scale(1.05)"/>
        <use href="#kstar" transform="translate(220,220) scale(1.05)"/>
      </g>
      <g fill="none" stroke="#c9a227" stroke-width="0.7" opacity="0.55">
        <use href="#kcross" transform="translate(110,0)"/>
        <use href="#kcross" transform="translate(0,110)"/>
        <use href="#kcross" transform="translate(220,110)"/>
        <use href="#kcross" transform="translate(110,220)"/>
      </g>
      <!-- interlace weave lines -->
      <g fill="none" stroke="#e6c45e" stroke-width="0.6" opacity="0.35">
        <path d="M0 110 H220 M110 0 V220"/>
        <circle cx="110" cy="110" r="30"/>
      </g>
      <!-- tiny gold nodes -->
      <g fill="#e6c45e" opacity="0.6">
        <circle cx="110" cy="110" r="2.4"/>
        <circle cx="0" cy="0" r="2.4"/><circle cx="220" cy="0" r="2.4"/>
        <circle cx="0" cy="220" r="2.4"/><circle cx="220" cy="220" r="2.4"/>
      </g>
    </pattern>

    <!-- fine micro-lattice overlay -->
    <pattern id="micro" width="44" height="44" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#9fd8e0" stroke-width="0.45" opacity="0.16">
        <path d="M0 22 H44 M22 0 V44"/>
        <circle cx="22" cy="22" r="9"/>
        <path d="M22 13 V31 M13 22 H31"/>
      </g>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#wall)"/>
  <rect width="100%" height="100%" fill="url(#micro)"/>
</svg>

<!-- Layer B: warm light shafts from above -->
<div class="bg-rays" aria-hidden="true"></div>
<div class="bg-glow" aria-hidden="true"></div>
<div class="bg-vignette" aria-hidden="true"></div>
<div id="particles" class="bg-particles" aria-hidden="true"></div>

<!-- ===== App ===== -->
<div id="app">

  <header class="topbar">
    <div class="title-block">
      <h1 class="title">Azul</h1>
      <svg class="flourish" viewBox="0 0 240 16" width="200" height="14" aria-hidden="true">
        <defs>
          <linearGradient id="fg" x1="0" x2="1">
            <stop offset="0" stop-color="#c9a227" stop-opacity="0"/>
            <stop offset="0.5" stop-color="#f3d676"/>
            <stop offset="1" stop-color="#c9a227" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="M0 8 H86 M154 8 H240" stroke="url(#fg)" stroke-width="1.4" fill="none"/>
        <path d="M120 2 l9 6 -9 6 -9 -6 z" fill="url(#fg)"/>
        <path d="M104 8 l8 -4 0 8 z M136 8 l8 -4 0 8 z" fill="url(#fg)" opacity="0.7"/>
        <circle cx="96" cy="8" r="1.4" fill="#f3d676"/>
        <circle cx="144" cy="8" r="1.4" fill="#f3d676"/>
      </svg>
    </div>
    <div class="header-controls">
      <button id="soundBtn" class="icon-btn" title="Toggle sound" aria-label="Toggle sound"></button>
      <button id="newGameBtn" class="btn-ghost">New Game</button>
    </div>
  </header>

  <!-- Opponents (tiny, dimmed) -->
  <div id="opponents" class="opponents-row"></div>

  <!-- Market: factories + center, floating -->
  <section id="market" class="market"></section>

  <!-- YOUR board (hero) -->
  <section id="selfBoard" class="self-board"></section>

  <!-- Status pill -->
  <div id="statusBar" class="status-pill"></div>

  <!-- Log toggle -->
  <button id="logToggle" class="log-toggle" title="Game log" aria-label="Game log"></button>

  <!-- Log panel (hidden by default) -->
  <aside id="logPanel" class="log-panel closed">
    <div class="log-head">
      <span>Chronicle</span>
      <button id="logClose" class="log-close" aria-label="Close log"></button>
    </div>
    <ul id="logList"></ul>
  </aside>
</div>

<!-- ===== Setup screen ===== -->
<div id="setupScreen" class="overlay">
  <div class="setup-card">
    <svg class="setup-emblem" viewBox="0 0 100 100" width="96" height="96" aria-hidden="true">
      <g fill="none" stroke="#f3d676" stroke-width="2.4" stroke-linejoin="round">
        <polygon points="50,10 56.5,34.3 78.3,21.7 65.7,43.5 90,50 65.7,56.5 78.3,78.3 56.5,65.7 50,90 43.5,65.7 21.7,78.3 34.3,56.5 10,50 34.3,43.5 21.7,21.7 43.5,34.3"/>
      </g>
      <circle cx="50" cy="50" r="11" fill="none" stroke="#c9a227" stroke-width="1.6"/>
      <circle cx="50" cy="50" r="3.4" fill="#f3d676"/>
    </svg>
    <h2 class="setup-title">Azul</h2>
    <p class="setup-sub">Decorate the wall of the royal palace.<br/>Choose your table.</p>
    <div class="setup-opts" id="setupOpts">
      <button class="setup-opt" data-players="2"><span class="so-num">1</span><span class="so-lbl">Opponent</span></button>
      <button class="setup-opt" data-players="3"><span class="so-num">2</span><span class="so-lbl">Opponents</span></button>
      <button class="setup-opt" data-players="4"><span class="so-num">3</span><span class="so-lbl">Opponents</span></button>
    </div>
  </div>
</div>

<!-- ===== Generic modal ===== -->
<div id="modalOverlay" class="overlay hidden">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <div id="modalBody"></div>
    <button id="modalClose" class="btn-primary">Play Again</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
